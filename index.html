<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARI Agent - Next Generation AI</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --dark-bg: #0f172a;
            --text-light: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid var(--primary-color);
            color: #60a5fa;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* 배경 애니메이션 효과 */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="status-badge">System Online: ariagent.co.kr</div>
        <h1>ARI Agent</h1>
        <p>새로운 인공지능 에이전트 서비스가 곧 시작됩니다.</p>
        <a href="mailto:imspinesurgeon@gmail.com" class="btn">문의하기</a>
    </div>
</body>
</html>
